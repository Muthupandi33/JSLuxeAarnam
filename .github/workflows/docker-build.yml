name: Build and Push Docker Image
on:
  push:
    branches: 
      - main
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            muthuphy33/jsluxe-app:${{ github.sha }}
            muthuphy33/jsluxe-app:latest

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image: muthuphy33/jsluxe-app:.*|image: muthuphy33/jsluxe-app:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Commit and push updated deployment.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jsluxe-app
  labels:
    app: jsluxe-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jsluxe-app
  template:
    metadata:
      labels:
        app: jsluxe-app
    spec:
      containers:
        - name: jsluxe-app
          image: muthuphy33/jsluxe-app:e56b73bbd4986f7c42ea0b7cc2f02f69427c64d1
          imagePullPolicy: Always
          ports:
            - containerPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jsluxe-app
  labels:
    app: jsluxe-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jsluxe-app
  template:
    metadata:
      labels:
        app: jsluxe-app
    spec:
      containers:
        - name: jsluxe-app
          image: muthuphy33/jsluxe-app:984f2d000ddcf1921fa697debd1865cb142565c8
          imagePullPolicy: Always
          ports:
            - containerPort: 80
